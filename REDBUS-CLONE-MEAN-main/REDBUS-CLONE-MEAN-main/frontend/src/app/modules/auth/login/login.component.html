<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-black px-4">
  <div class="w-full max-w-md bg-white dark:bg-gray-900 rounded-2xl shadow-lg p-8">
    <div class="flex justify-center mb-6">
      <img src="assets/redbus-logo.svg" alt="RedBus Elite" class="h-10" />
    </div>
    <h2 class="text-2xl font-bold text-center text-gray-800 dark:text-white mb-6">Sign In</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 text-sm bg-white dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-red-500"
        />
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']"
           class="text-red-500 text-xs mt-1">Email is required</p>
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']"
           class="text-red-500 text-xs mt-1">Enter a valid email</p>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-4 py-2 text-sm bg-white dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-red-500"
        />
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']"
           class="text-red-500 text-xs mt-1">Password is required</p>
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']"
           class="text-red-500 text-xs mt-1">Password must be at least 6 characters</p>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid || loading"
        class="w-full bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white font-semibold py-2 rounded-lg transition duration-200"
      >
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
      Don't have an account?
      <a routerLink="/auth/register" class="text-red-600 hover:underline font-medium">Register</a>
    </p>
  </div>
</div>
